<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TuteDude JS Assignment</title>
  <style>
    /* ── Reset & Base ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #fff;
    }

    /* ── Top Header Bar ── */
    header {
      width: 100%;
      background: #f1f1f1;
      border-bottom: 1px solid #ddd;
      text-align: center;
      padding: 12px 0;
      font-size: 20px;
      color: #333;
    }

    /* ── Color Boxes Section ── */
    .color-section {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 80px;
    }

    .color-box {
      width: 100px;
      height: 80px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #555;
      cursor: pointer;
      background-color: #fff;   /* default = white/empty */
      user-select: none;
    }

    /* When clicked, text turns white for dark boxes */
    .color-box.active {
      color: #fff;
    }

    /* Yellow text stays dark */
    .color-box.active.yellow-box {
      color: #333;
    }

    /* ── Greet Section ── */
    .greet-section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 80px;
    }

    .greet-section input {
      padding: 6px 10px;
      font-size: 14px;
      border: 1px solid #aaa;
      width: 200px;
    }

    .greet-section button {
      padding: 6px 14px;
      font-size: 14px;
      background: #e0e0e0;
      border: 1px solid #aaa;
      cursor: pointer;
    }

    .greet-section button:hover {
      background: #d0d0d0;
    }
  </style>
</head>
<body>

  <!-- Header: shows greeting -->
  <header id="greeting">Hello</header>

  <!-- Color Boxes -->
  <div class="color-section">
    <div class="color-box" id="box-red"    onclick="toggleColor(this, 'red',    false)">Red</div>
    <div class="color-box" id="box-blue"   onclick="toggleColor(this, 'blue',   false)">Blue</div>
    <div class="color-box" id="box-green"  onclick="toggleColor(this, 'green',  false)">Green</div>
    <div class="color-box yellow-box" id="box-yellow" onclick="toggleColor(this, 'yellow', true)">Yellow</div>
  </div>

  <!-- Greet Section -->
  <div class="greet-section">
    <input type="text" id="nameInput" placeholder="Enter your name..." />
    <button onclick="greetUser()">Greet</button>
  </div>

  <script>
    // ── Greet Function ──
    // Reads the name input and updates the header
    function greetUser() {
      const name = document.getElementById('nameInput').value.trim();
      const greeting = document.getElementById('greeting');

      if (name !== '') {
        greeting.textContent = 'Hello, ' + name;
      } else {
        greeting.textContent = 'Hello';
      }
    }

    // Allow pressing Enter key to greet
    document.getElementById('nameInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') greetUser();
    });

    // ── Color Toggle Function ──
    // Clicking a box fills it with its color; clicking again resets to white
    function toggleColor(box, color, isYellow) {
      if (box.classList.contains('active')) {
        // Already colored → reset to white
        box.style.backgroundColor = '#fff';
        box.style.color = '#555';
        box.classList.remove('active');
      } else {
        // Not colored → fill with color
        box.style.backgroundColor = color;
        box.classList.add('active');

        if (isYellow) {
          // Yellow box → keep text dark
          box.style.color = '#333';
        } else {
          // Dark color boxes → white text
          box.style.color = '#fff';
        }
      }
    }
  </script>

</body>
</html>
