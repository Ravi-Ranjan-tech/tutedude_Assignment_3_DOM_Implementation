<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TuteDude JS Assignment</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #fff;
    }

    header {
      width: 100%;
      background: #f1f1f1;
      border-bottom: 1px solid #ddd;
      text-align: center;
      padding: 12px 0;
      font-size: 20px;
      color: #333;
    }

    .color-section {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 80px;
    }

    .color-box {
      width: 100px;
      height: 80px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #555;
      cursor: pointer;
      background-color: #fff;
      user-select: none;
      transition: background-color 0.2s ease;
    }

    .color-box[data-color="red"].active    { background-color: red;    color: #fff; }
    .color-box[data-color="blue"].active   { background-color: blue;   color: #fff; }
    .color-box[data-color="green"].active  { background-color: green;  color: #fff; }
    .color-box[data-color="yellow"].active { background-color: yellow; color: #333; }

    .greet-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 80px;
    }

    .greet-row {
      display: flex;
      gap: 8px;
    }

    .greet-section input {
      padding: 6px 10px;
      font-size: 14px;
      border: 1px solid #aaa;
      width: 200px;
    }

    .greet-section input.input-error {
      border-color: red;
    }

    .greet-section button {
      padding: 6px 14px;
      font-size: 14px;
      background: #e0e0e0;
      border: 1px solid #aaa;
      cursor: pointer;
    }

    .greet-section button:hover {
      background: #d0d0d0;
    }

    .error-msg {
      font-size: 12px;
      color: red;
      min-height: 16px;
    }
  </style>
</head>
<body>

  <header id="greeting">Hello</header>

  <div class="color-section">
    <div class="color-box" data-color="red">Red</div>
    <div class="color-box" data-color="blue">Blue</div>
    <div class="color-box" data-color="green">Green</div>
    <div class="color-box" data-color="yellow">Yellow</div>
  </div>

  <div class="greet-section">
    <div class="greet-row">
      <input type="text" id="nameInput" placeholder="Enter your name..." maxlength="50" autocomplete="off" />
      <button id="greetBtn">Greet</button>
    </div>
    <span class="error-msg" id="errorMsg"></span>
  </div>

  <script>
    'use strict';

    const nameInput = document.getElementById('nameInput');
    const greetBtn  = document.getElementById('greetBtn');
    const greeting  = document.getElementById('greeting');
    const errorMsg  = document.getElementById('errorMsg');

    const namePattern = /^[A-Za-z\s'\-]{2,50}$/;

    document.querySelectorAll('.color-box').forEach(function(box) {
      box.addEventListener('click', function() {
        box.classList.toggle('active');
      });
    });

    function greetUser() {
      const name = nameInput.value.trim();

      if (name === '') {
        showError('Name cannot be empty.');
        return;
      }

      if (!namePattern.test(name)) {
        showError('Only letters, spaces, hyphens and apostrophes allowed (min 2 chars).');
        return;
      }

      clearError();
      greeting.textContent = 'Hello, ' + name;
    }

    function showError(msg) {
      nameInput.classList.add('input-error');
      errorMsg.textContent = msg;
    }

    function clearError() {
      nameInput.classList.remove('input-error');
      errorMsg.textContent = '';
    }

    greetBtn.addEventListener('click', greetUser);

    nameInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') greetUser();
    });

    nameInput.addEventListener('input', clearError);
  </script>

</body>
</html>
